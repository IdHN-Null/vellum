<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FMS Render Test</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<script>
  // 번들 폰트를 강제 로드한 뒤 렌더 (canvas가 폰트를 쓰려면 로드 완료 필요)
  Promise.all([
    document.fonts.load('600 40px "FMS Serif"'),
    document.fonts.load('600 40px "FMS Hand"'),
  ]).catch(() => {}).then(() => {
    const s = document.createElement('script');
    s.src = '/preview.js';
    document.body.appendChild(s);
  });
</script>
</body>
</html>
