<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FMS Render Test</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<script>
  // Force-load the bundled fonts before rendering (canvas needs them fully loaded)
  Promise.all([
    document.fonts.load('600 40px "FMS Serif"'),
    document.fonts.load('600 40px "FMS Hand"'),
  ]).catch(() => {}).then(() => {
    const s = document.createElement('script');
    s.src = '/preview.js';
    document.body.appendChild(s);
  });
</script>
</body>
</html>
